<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organiza+ | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #f1f5f9; padding: 20px;">

    <div class="container">
        <header>
            <h1>Organiza+ 📱</h1>
            <p>Controle de Estoque & Assistência Técnica</p>
        </header>

        <div class="card" style="margin-bottom: 30px; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 15px;">📦 Cadastrar Novo Produto / Componente</h2>
            <form id="formCadastro" onsubmit="cadastrarProduto(event)" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; align-items: end;">
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:0.9rem; color:#475569;">Sigla / Código</label>
                    <input type="text" id="cadSigla" placeholder="Ex: TELA-IPH13" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;" required>
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:0.9rem; color:#475569;">Nome do Produto</label>
                    <input type="text" id="cadNome" placeholder="Ex: Tela iPhone 13" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;" required>
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:0.9rem; color:#475569;">Preço (R$)</label>
                    <input type="number" step="0.01" id="cadPreco" placeholder="0.00" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;" required>
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:0.9rem; color:#475569;">Qtd Inicial</label>
                    <input type="number" id="cadQtd" placeholder="0" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;" required>
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:0.9rem; color:#475569;">Estoque Mínimo</label>
                    <input type="number" id="cadMinimo" placeholder="0" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;" required>
                </div>
                <button type="submit" style="background: #22c55e; color: white; font-weight: bold; height: 38px; border: none; border-radius: 6px; cursor: pointer;">Salvar Item</button>
            </form>
        </div>

        <div class="grid">
            <div class="card">
                <h2>🔍 Pesquisa Rápida (Digitar Sigla)</h2>
                <div class="search-box">
                    <input type="text" id="inputBusca" placeholder="Ex: TELA-IPH11">
                    <button onclick="buscarProduto()">Buscar</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Sigla</th>
                            <th>Produto</th>
                            <th>Preço</th>
                            <th>Qtd</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaBusca">
                        </tbody>
                </table>
            </div>

            <div class="card">
                <h2>⚠️ Alertas de Estoque Baixo</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Qtd Atual</th>
                            <th>Mínimo</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAlertas">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
